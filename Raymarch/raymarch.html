<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Raymarch - Operacje CSG (Wariant Prosty)</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    

    #controls {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 15px;
        z-index: 10;
    }
    
    #controls button {
        background-color: #1a1b26;
        color: #fff;
        border: 2px solid #3b4059;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 6px;
        transition: all 0.2s ease;
    }
    
    #controls button:hover {
        background-color: #242638;
        border-color: #5a628c;
    }
    

    #controls button.aktywny {
        border-color: #ddaa22;
        background-color: #2b2d42;
        color: #ddaa22;
    }
</style>
</head>
<body>

<div id="controls">
    <button onclick="ustawOperacje(0, this)" class="aktywny">Suma</button>
    <button onclick="ustawOperacje(1, this)">Przecięcie</button>
    <button onclick="ustawOperacje(2, this)">Różnica</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
    }
}
</script>

<script type="x-shader/x-vertex" id="vshader-source">
    void main() {
        gl_Position = vec4(position, 1.0);
    }
</script>

<script type="x-shader/x-fragment" id="fshader-source">
    uniform vec2 u_resolution;
    uniform float u_time;
    uniform int u_operation;

    #define MAX_STEPS 100
    #define MAX_DIST  50.0
    #define SURF_DIST 0.001

    vec2 obrot2D(vec2 p, float a) {
        float s = sin(a);
        float c = cos(a);
        return vec2(p.x * c - p.y * s, p.x * s + p.y * c);
    }

    float sdSphere(vec3 p, float r) {
        return length(p) - r;
    }


    float sdBox(vec3 p, vec3 b) {
        vec3 q = abs(p) - b;
        return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0);
    }


    float scene(vec3 p) {

        float tx = 0.48 * sin(u_time * 1.1);
        float ty = 0.24 * sin(u_time * 2.2);
        float kolo = sdSphere(p - vec3(tx, ty, 0.0), 0.30);


        float kat = u_time * 0.75;
        float skala = 1.0 + 0.35 * sin(u_time * 1.4);
        
        vec2 pOb = obrot2D(p.xy, kat);
        float prosto = sdBox(vec3(pOb, p.z), vec3(0.36 * skala, 0.19 / skala, 0.36));


        if (u_operation == 0) return min(kolo, prosto);  // Suma
        if (u_operation == 1) return max(kolo, prosto);  // Przecięcie
        return max(kolo, -prosto);                       // Różnica
    }


    float rayMarch(vec3 ro, vec3 rd) {
        float d = 0.0;
        for (int i = 0; i < MAX_STEPS; i++) {
            vec3 p = ro + rd * d;
            float h = scene(p);
            if (h < SURF_DIST) break;
            if (d > MAX_DIST)  break;
            d += h;
        }
        return d;
    }

    void main() {
        // Normalizacja układu współrzędnych ekranu
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution) / u_resolution.y;

        // Definicja parametrów kamery (pozycja początkowa i kierunek rzutu)
        vec3 ro = vec3(0.0, 0.0, 3.0);
        vec3 rd = normalize(vec3(uv, -2.0));

        float d = rayMarch(ro, rd);

        // Kolor tła zdefiniowany w sprawozdaniu (ciemny fiolet/granat)
        vec3 col = vec3(0.23, 0.25, 0.35);

        // Jeśli promień trafił w wynikową bryłę (SDF < 0), zmieniamy kolor powierzchni
        if (d < MAX_DIST) {
            // Charakterystyczny błękitny/cyan kolor kształtu z wyniku działania programu
            col = vec3(0.42, 0.88, 0.95);
        }

        gl_FragColor = vec4(col, 1.0);
    }
</script>

<script type="module">
    import * as THREE from 'three';

    const scena = new THREE.Scene();
    

    const kamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);


    const geometria = new THREE.PlaneGeometry(2, 2);
    
    const material = new THREE.ShaderMaterial({
        vertexShader: document.getElementById('vshader-source').textContent,
        fragmentShader: document.getElementById('fshader-source').textContent,
        uniforms: {
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            u_time:       { value: 0.0 },
            u_operation:  { value: 0 }
        }
    });

    scena.add(new THREE.Mesh(geometria, material));


    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        material.uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
    });


    window.ustawOperacje = function(numer, btn) {
        material.uniforms.u_operation.value = numer;
        document.querySelectorAll('#controls button').forEach(b => b.classList.remove('aktywny'));
        btn.classList.add('aktywny');
    };

    // Pętla odświeżania i renderowania sceny
    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        material.uniforms.u_time.value = clock.getElapsedTime();
        renderer.render(scena, kamera);
    }
    animate();
</script>
</body>
</html>
